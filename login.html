<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 喵宿咖啡厅</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body { margin:0; font-family:"Segoe UI",sans-serif; background:#f4f8ff; display:flex; align-items:center; justify-content:center; height:100vh; }
        .box { width:360px; background:#fff; padding:28px; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,0.08); text-align:center; }
        h2 { color:#2f5fa8; margin:0 0 12px; }
        input { width:100%; padding:12px; margin-top:12px; border-radius:10px; border:1px solid #e6eefc; outline:none; }
        button { width:100%; padding:12px; margin-top:18px; background:#6aa6ff; color:#fff; border:none; border-radius:10px; font-weight:700; cursor:pointer; }
        .hint { margin-top:12px; color:#777; font-size:13px; }
    </style>
</head>
<body>

<div class="box">
    <h2>请输入统一密码登录</h2>
    <input id="loginPass" type="password" placeholder="统一密码">
    <button onclick="login()">登录</button>
    <div class="hint">登录后可访问主页并查看玩家简介</div>
</div>

<script src="js/login.js"></script>
</body>
</html>
