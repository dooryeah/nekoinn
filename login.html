<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 喵宿咖啡厅</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f8ff;
        }

        .container {
            width: 320px;
            margin: 150px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #4a6fa5;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #d0d9ff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #6aa6ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #4f8df0;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>输入密码进入喵宿咖啡厅</h2>

        <input id="loginPass" type="password" placeholder="请输入统一密码">

        <button onclick="login()">登录</button>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
