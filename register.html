<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - 喵宿咖啡厅</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f8ff;
        }

        .container {
            width: 320px;
            margin: 150px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #4a6fa5;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #d0d9ff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #6aa6ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #4f8df0;
        }

        .switch {
            margin-top: 16px;
            font-size: 14px;
        }

        .switch a {
            color: #4a6fa5;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>注册喵宿账号</h2>

        <input id="regUser" type="text" placeholder="用户名">
        <input id="regPass" type="password" placeholder="密码">

        <button onclick="register()">注册</button>

        <p class="switch">
            已有账号？ <a href="login.html">去登录</a>
        </p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
